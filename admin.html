<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 고유재 한옥스튜디오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#1c1814;--paper:#f7f2ea;--paper2:#f0e9dc;--gold:#a07840;--gold2:#c49a58;--muted:#7a6e62;--line:rgba(28,24,20,0.1);--green:#3a6b3a;--red:#8b2e2e;--dark:#0f0d0b;}
body{font-family:'Noto Sans KR',sans-serif;background:#1a1714;color:var(--paper);font-weight:300;line-height:1.7;min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{background:rgba(247,242,234,0.04);border:0.5px solid rgba(247,242,234,0.1);padding:56px 48px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;letter-spacing:0.15em;color:var(--paper);margin-bottom:4px;}
.login-logo em{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--gold);letter-spacing:0.25em;display:block;margin-bottom:36px;}
.login-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--gold2);letter-spacing:0.2em;margin-bottom:32px;}
.pw-input{width:100%;background:rgba(247,242,234,0.05);border:0.5px solid rgba(247,242,234,0.15);color:var(--paper);padding:14px 16px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:300;outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:16px;transition:border-color .3s;}
.pw-input:focus{border-color:var(--gold);}
.pw-input::placeholder{color:rgba(247,242,234,0.25);letter-spacing:0.05em;}
.btn-login{width:100%;background:var(--gold);color:var(--ink);border:none;padding:15px;font-family:'Noto Sans KR',sans-serif;font-size:12px;letter-spacing:0.22em;cursor:pointer;transition:all .3s;}
.btn-login:hover{background:var(--gold2);}
.login-err{font-size:12px;color:#e07070;margin-top:12px;letter-spacing:0.05em;display:none;}

/* ADMIN LAYOUT */
.admin-wrap{display:none;min-height:100vh;}
.admin-nav{background:rgba(15,13,11,0.95);border-bottom:0.5px solid rgba(247,242,234,0.08);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.admin-brand{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:400;letter-spacing:0.12em;color:var(--paper);}
.admin-brand em{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--gold);letter-spacing:0.2em;margin-left:8px;}
.admin-nav-right{display:flex;align-items:center;gap:20px;}
.admin-today{font-size:12px;color:rgba(247,242,234,0.4);letter-spacing:0.05em;}
.btn-logout{font-size:11px;letter-spacing:0.15em;color:rgba(247,242,234,0.4);background:none;border:0.5px solid rgba(247,242,234,0.15);padding:6px 14px;cursor:pointer;transition:all .3s;}
.btn-logout:hover{color:var(--paper);border-color:rgba(247,242,234,0.4);}
.btn-refresh{font-size:11px;letter-spacing:0.15em;color:var(--gold);background:none;border:0.5px solid rgba(160,120,64,0.3);padding:6px 14px;cursor:pointer;transition:all .3s;}
.btn-refresh:hover{background:rgba(160,120,64,0.1);}
.btn-write{font-size:11px;letter-spacing:0.15em;color:var(--ink);background:var(--gold);border:none;padding:6px 16px;cursor:pointer;transition:all .3s;}
.btn-write:hover{background:var(--gold2);}

/* 글쓰기 모달 */
.write-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.write-modal-bg.show{display:flex;}
.write-modal{background:#1a1714;border:0.5px solid rgba(247,242,234,0.1);width:100%;max-width:500px;padding:36px;position:relative;max-height:90vh;overflow-y:auto;}
.write-modal-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:300;color:var(--paper);margin-bottom:28px;letter-spacing:0.05em;}
.write-field{margin-bottom:20px;}
.write-label{display:block;font-size:10px;letter-spacing:0.2em;color:rgba(247,242,234,0.4);margin-bottom:8px;}
.write-input,.write-select,.write-textarea{width:100%;background:rgba(247,242,234,0.05);border:0.5px solid rgba(247,242,234,0.12);color:var(--paper);padding:11px 14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .3s;-webkit-appearance:none;}
.write-input:focus,.write-select:focus,.write-textarea:focus{border-color:var(--gold);}
.write-input::placeholder,.write-textarea::placeholder{color:rgba(247,242,234,0.2);}
.write-textarea{resize:vertical;min-height:100px;line-height:1.8;}
.write-select option{background:#1a1714;}
.write-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.btn-write-submit{width:100%;background:var(--gold);color:var(--ink);border:none;padding:14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;letter-spacing:0.22em;cursor:pointer;transition:all .3s;margin-top:8px;}
.btn-write-submit:hover{background:var(--gold2);}
.write-close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(247,242,234,0.4);font-size:18px;cursor:pointer;}
.write-hint{font-size:11px;color:rgba(247,242,234,0.3);margin-top:6px;letter-spacing:0.05em;line-height:1.7;}

.admin-body{padding:32px;}

/* 통계 */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:32px;}
.stat-card{background:rgba(247,242,234,0.04);border:0.5px solid rgba(247,242,234,0.08);padding:20px 24px;}
.stat-label{font-size:10px;letter-spacing:0.2em;color:rgba(247,242,234,0.4);margin-bottom:8px;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;}
.stat-num.gold{color:var(--gold);}
.stat-num.green{color:#6aaa6a;}
.stat-num.orange{color:#e0a050;}
.stat-num.red{color:#e07070;}

/* 필터 */
.filter-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-size:11px;letter-spacing:0.15em;padding:7px 16px;background:none;border:0.5px solid rgba(247,242,234,0.15);color:rgba(247,242,234,0.5);cursor:pointer;transition:all .3s;}
.filter-btn:hover,.filter-btn.active{background:rgba(160,120,64,0.15);border-color:rgba(160,120,64,0.4);color:var(--gold2);}
.search-input{background:rgba(247,242,234,0.05);border:0.5px solid rgba(247,242,234,0.12);color:var(--paper);padding:7px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:300;outline:none;margin-left:auto;width:200px;transition:border-color .3s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:rgba(247,242,234,0.25);}

/* 예약 카드 */
.cards-wrap{display:flex;flex-direction:column;gap:2px;}
.res-card{background:rgba(247,242,234,0.03);border:0.5px solid rgba(247,242,234,0.07);transition:background .2s;}
.res-card:hover{background:rgba(247,242,234,0.06);}
.res-card-head{display:grid;grid-template-columns:160px 1fr auto auto;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;}
.res-date{font-size:12px;color:rgba(247,242,234,0.45);letter-spacing:0.05em;}
.res-name-wrap{}
.res-name{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:300;letter-spacing:0.05em;margin-bottom:2px;}
.res-sub{font-size:11px;color:rgba(247,242,234,0.4);letter-spacing:0.05em;}
.res-product{font-size:12px;color:rgba(247,242,234,0.5);letter-spacing:0.05em;text-align:right;}
.status-select{appearance:none;-webkit-appearance:none;border:0.5px solid;padding:5px 12px;font-family:'Noto Sans KR',sans-serif;font-size:11px;letter-spacing:0.08em;cursor:pointer;outline:none;transition:all .3s;min-width:110px;text-align:center;}
.status-select.waiting{color:#c49a20;border-color:rgba(196,154,32,0.4);background:rgba(196,154,32,0.08);}
.status-select.done{color:#6aaa6a;border-color:rgba(106,170,106,0.4);background:rgba(106,170,106,0.08);}
.status-select.cancel{color:#e07070;border-color:rgba(224,112,112,0.4);background:rgba(224,112,112,0.08);}
.status-select option{background:#1a1714;color:var(--paper);}

/* 상세 펼침 */
.res-detail{display:none;padding:0 20px 20px;border-top:0.5px solid rgba(247,242,234,0.06);}
.res-detail.open{display:block;}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;}
.detail-item{background:rgba(247,242,234,0.03);padding:12px 14px;}
.detail-key{font-size:10px;letter-spacing:0.18em;color:rgba(247,242,234,0.35);margin-bottom:5px;}
.detail-val{font-size:13px;color:rgba(247,242,234,0.8);letter-spacing:0.03em;}

/* 저장 피드백 */
.save-toast{position:fixed;bottom:32px;right:32px;background:var(--green);color:var(--paper);padding:12px 24px;font-size:12px;letter-spacing:0.1em;display:none;z-index:200;}
.save-toast.show{display:block;}

/* LOADING */
.loading-wrap{text-align:center;padding:80px 0;color:rgba(247,242,234,0.3);font-size:13px;letter-spacing:0.1em;}
.spinner{display:inline-block;width:28px;height:28px;border:1px solid rgba(247,242,234,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-wrap{text-align:center;padding:80px 0;}
.empty-icon{font-size:40px;opacity:0.2;margin-bottom:16px;}
.empty-text{font-size:13px;color:rgba(247,242,234,0.3);letter-spacing:0.1em;}

@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .res-card-head{grid-template-columns:1fr auto;}
  .res-date,.res-product{display:none;}
  .detail-grid{grid-template-columns:1fr 1fr;}
  .admin-body{padding:20px 16px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">고유재 한옥스튜디오<em>Admin</em></div>
    <div class="login-title">관리자 로그인</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <nav class="admin-nav">
    <div>
      <span class="admin-brand">고유재 한옥스튜디오<em>관리자</em></span>
    </div>
    <div class="admin-nav-right">
      <span class="admin-today" id="todayLabel"></span>
      <button class="btn-write" onclick="openWriteModal()">✎ 게시글 작성</button>
      <a href="/board.html" target="_blank" class="btn-refresh" style="text-decoration:none;">게시판 보기</a>
      <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="admin-body">
    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">전체 예약</div><div class="stat-num gold" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">예약완료</div><div class="stat-num green" id="statDone">—</div></div>
      <div class="stat-card"><div class="stat-label">확인중</div><div class="stat-num orange" id="statWaiting">—</div></div>
      <div class="stat-card"><div class="stat-label">취소</div><div class="stat-num red" id="statCancel">—</div></div>
    </div>

    <!-- 필터 -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" data-filter="waiting" onclick="setFilter('waiting',this)">⏳ 확인중</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">✅ 예약완료</button>
      <button class="filter-btn" data-filter="cancel" onclick="setFilter('cancel',this)">❌ 취소</button>
      <input type="text" class="search-input" id="searchInput" placeholder="이름 · 연락처 검색" oninput="renderCards()">
    </div>

    <!-- 카드 목록 -->
    <div class="cards-wrap" id="cardsWrap">
      <div class="loading-wrap"><div class="spinner"></div><br>예약 데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 저장 토스트 -->
<div class="save-toast" id="saveToast">✓ 상태가 저장되었습니다</div>

<!-- 글쓰기 모달 -->
<div class="write-modal-bg" id="writeModalBg">
  <div class="write-modal">
    <button class="write-close" onclick="closeWriteModal()">✕</button>
    <div class="write-modal-title">✎ 게시글 작성</div>
    <div class="write-field">
      <label class="write-label">카테고리</label>
      <select class="write-select" id="wCategory">
        <option value="예약확정">예약확정</option>
        <option value="공지">공지</option>
      </select>
    </div>
    <div class="write-field">
      <label class="write-label">제목 *</label>
      <input type="text" class="write-input" id="wTitle" placeholder="예) 김시우님 예약완료 ✅">
      <div class="write-hint">
        · 예약확정: 홍길동님 예약완료 ✅<br>
        · 쌍둥이: 김시우, 김시아님 예약완료 ✅<br>
        · 공지: [공지] 휴무 안내
      </div>
    </div>
    <div class="write-field">
      <label class="write-label">내용 (선택)</label>
      <textarea class="write-textarea" id="wContent" placeholder="내용을 입력하세요. 비워두면 기본 메시지가 표시됩니다."></textarea>
    </div>
    <div class="write-grid">
      <div class="write-field">
        <label class="write-label">공개 여부</label>
        <select class="write-select" id="wPublic">
          <option value="공개">공개</option>
          <option value="비공개">비공개</option>
        </select>
      </div>
      <div class="write-field">
        <label class="write-label">비밀번호 (비밀글 시)</label>
        <input type="text" class="write-input" id="wPassword" placeholder="전화번호 끝 4자리">
      </div>
    </div>
    <button class="btn-write-submit" onclick="submitPost()">게시글 등록하기</button>
  </div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxw6SJr24RXTlQFRnT71kSNHnCVm-AoIQzBNd-08xFFV-wdIzqkcQqso-06DahZFFmf/exec';
const ADMIN_PW='koyuje2024!';

let allData=[];
let currentFilter='all';
let adminPw='';

// 오늘 날짜
const now=new Date();
document.getElementById('todayLabel').textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';

function doLogin(){
  const pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PW){
    adminPw=pw;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

function doLogout(){
  adminPw='';
  allData=[];
  document.getElementById('adminWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
}

function loadData(){
  document.getElementById('cardsWrap').innerHTML='<div class="loading-wrap"><div class="spinner"></div><br>예약 데이터를 불러오는 중...</div>';
  fetch(SCRIPT_URL+'?action=admin&pw='+encodeURIComponent(adminPw))
    .then(r=>r.json())
    .then(data=>{
      if(data.result==='error'){alert('데이터 로드 실패: '+data.message);return;}
      allData=data.data||[];
      updateStats();
      renderCards();
    })
    .catch(()=>{ document.getElementById('cardsWrap').innerHTML='<div class="loading-wrap"><div class="empty-icon">⚠️</div><br><div class="empty-text">데이터 로드 실패. 새로고침 해주세요.</div></div>'; });
}

function updateStats(){
  const total=allData.length;
  const done=allData.filter(d=>d.status&&(d.status.includes('완료')||d.status.includes('✅'))).length;
  const waiting=allData.filter(d=>!d.status||d.status.includes('확인중')).length;
  const cancel=allData.filter(d=>d.status&&(d.status.includes('취소')||d.status.includes('❌'))).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statWaiting').textContent=waiting;
  document.getElementById('statCancel').textContent=cancel;
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function getStatusClass(s){
  if(!s||s.includes('확인중'))return'waiting';
  if(s.includes('완료')||s.includes('✅'))return'done';
  if(s.includes('취소')||s.includes('❌'))return'cancel';
  return'waiting';
}

function fDate(d){
  if(!d)return'-';
  const s=String(d).trim();
  if(s.includes('년')&&s.includes('('))return s;
  const days=['일','월','화','수','목','금','토'];
  // 구글 시트 날짜 일련번호 (정수, 40000~60000 범위)
  const num=parseFloat(s);
  if(!isNaN(num)&&num>40000&&num<60000){
    // 구글 시트 기준일: 1899-12-30
    const dt=new Date((num-25569)*86400*1000);
    return dt.getUTCFullYear()+'년 '+(dt.getUTCMonth()+1)+'월 '+dt.getUTCDate()+'일 ('+days[dt.getUTCDay()]+')';
  }
  // YYYY-MM-DD 또는 일반 날짜 문자열
  const dt=new Date(s);
  if(!isNaN(dt.getTime())){
    return dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+days[dt.getDay()]+')';
  }
  return s;
}

function fTime(t){
  if(!t)return'';
  const s=String(t).trim();
  // ISO 날짜 형식: 1899-12-30T01:32:08.000Z
  const isoMatch=s.match(/T(\d{2}):(\d{2})/);
  if(isoMatch){
    const h=parseInt(isoMatch[1]),m=isoMatch[2];
    return(h<12?'오전 ':'오후 ')+(h===0?12:h>12?h-12:h)+'시 '+m+'분';
  }
  // 구글 시트 소수 형식
  const num=parseFloat(s);
  if(!isNaN(num)&&num>=0&&num<1){
    const totalMin=Math.round(num*24*60);
    const h=Math.floor(totalMin/60),m=String(totalMin%60).padStart(2,'0');
    return(h<12?'오전 ':'오후 ')+(h===0?12:h>12?h-12:h)+'시 '+m+'분';
  }
  // HH:MM 문자열 형식
  const match=s.match(/^(\d{1,2}):(\d{2})/);
  if(match){
    const h=parseInt(match[1]),m=match[2];
    return(h<12?'오전 ':'오후 ')+(h===0?12:h>12?h-12:h)+'시 '+m+'분';
  }
  return s;
}

function renderCards(){
  const keyword=(document.getElementById('searchInput').value||'').toLowerCase();
  let filtered=allData.filter(d=>{
    const sc=getStatusClass(d.status||'');
    if(currentFilter!=='all'&&sc!==currentFilter)return false;
    if(keyword&&!((d.babyName||'').includes(keyword)&&true)&&!(d.babyName||'').toLowerCase().includes(keyword)&&!(d.parentName||'').toLowerCase().includes(keyword)&&!(d.phone||'').includes(keyword))return false;
    return true;
  });

  // 최신순 정렬
  filtered=filtered.slice().reverse();

  if(filtered.length===0){
    document.getElementById('cardsWrap').innerHTML='<div class="empty-wrap"><div class="empty-icon">📋</div><div class="empty-text">해당하는 예약이 없습니다</div></div>';
    return;
  }

  const html=filtered.map((item,idx)=>{
    const sc=getStatusClass(item.status||'');
    const statusLabel=item.status||'⏳ 확인중';
    return `
    <div class="res-card" id="card_${idx}">
      <div class="res-card-head" onclick="toggleDetail('detail_${idx}')">
        <div class="res-date">${fDate(item.shootDate)} ${fTime(item.shootTime)}</div>
        <div class="res-name-wrap">
          <div class="res-name">${item.babyName||'-'} <span style="font-size:11px;color:rgba(247,242,234,0.35);font-family:'Cormorant Garamond',serif;font-style:italic;">아기</span></div>
          <div class="res-sub">${item.parentName||''} · ${item.phone||''}</div>
        </div>
        <div class="res-product">${item.product||''}</div>
        <select class="status-select ${sc}" onchange="updateStatus(this,'${item.rowId}')" onclick="event.stopPropagation()">
          <option value="⏳ 확인중" ${!item.status||item.status.includes('확인중')?'selected':''}>⏳ 확인중</option>
          <option value="✅ 예약완료" ${item.status&&item.status.includes('✅')?'selected':''}>✅ 예약완료</option>
          <option value="❌ 취소" ${item.status&&item.status.includes('❌')?'selected':''}>❌ 취소</option>
        </select>
      </div>
      <div class="res-detail" id="detail_${idx}">
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-key">아기 성별</div><div class="detail-val">${item.babyGender||'-'}</div></div>
          <div class="detail-item"><div class="detail-key">연락처</div><div class="detail-val">${item.phone||'-'}</div></div>
          <div class="detail-item"><div class="detail-key">이메일</div><div class="detail-val" style="font-size:12px;">${item.email||'-'}</div></div>
          <div class="detail-item"><div class="detail-key">촬영 날짜</div><div class="detail-val">${fDate(item.shootDate)}</div></div>
          <div class="detail-item"><div class="detail-key">촬영 시간</div><div class="detail-val">${fTime(item.shootTime)}</div></div>
          <div class="detail-item"><div class="detail-key">선택 상품</div><div class="detail-val">${item.product||'-'}</div></div>
          <div class="detail-item"><div class="detail-key">추가 구성</div><div class="detail-val" style="font-size:12px;">${item.extra||'없음'}</div></div>
          <div class="detail-item"><div class="detail-key">입금자명</div><div class="detail-val">${item.depositor||'-'}</div></div>
          <div class="detail-item"><div class="detail-key">제출 일시</div><div class="detail-val" style="font-size:12px;">${item.rowId||'-'}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('cardsWrap').innerHTML=html;
}

function toggleDetail(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function updateStatus(select,rowId){
  const newStatus=select.value;
  const sc=getStatusClass(newStatus);
  select.className='status-select '+sc;

  fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({action:'updateStatus',adminPw:adminPw,rowId:rowId,status:newStatus})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.result==='success'){
      // 로컬 데이터 업데이트
      const item=allData.find(d=>String(d.rowId)===String(rowId));
      if(item)item.status=newStatus;
      updateStats();
      showToast();
    } else {
      alert('저장 실패: '+data.message);
    }
  })
  .catch(()=>alert('저장 중 오류가 발생했습니다.'));
}

function showToast(){
  const t=document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// 글쓰기 모달
function openWriteModal(){
  document.getElementById('writeModalBg').classList.add('show');
  document.getElementById('wTitle').focus();
}
function closeWriteModal(){
  document.getElementById('writeModalBg').classList.remove('show');
  document.getElementById('wTitle').value='';
  document.getElementById('wContent').value='';
  document.getElementById('wPassword').value='';
}
function submitPost(){
  const title=document.getElementById('wTitle').value.trim();
  if(!title){alert('제목을 입력해주세요.');document.getElementById('wTitle').focus();return;}
  const btn=document.querySelector('.btn-write-submit');
  btn.disabled=true;btn.textContent='등록 중...';
  fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'writePost',
      adminPw:adminPw,
      title:title,
      content:document.getElementById('wContent').value.trim(),
      category:document.getElementById('wCategory').value,
      isPublic:document.getElementById('wPublic').value,
      password:document.getElementById('wPassword').value.trim(),
      author:'고유재'
    })
  })
  .then(r=>r.json())
  .then(data=>{
    btn.disabled=false;btn.textContent='게시글 등록하기';
    if(data.result==='success'){
      closeWriteModal();
      const t=document.getElementById('saveToast');
      t.textContent='✓ 게시글이 등록되었습니다';
      t.classList.add('show');
      setTimeout(()=>{t.classList.remove('show');t.textContent='✓ 상태가 저장되었습니다';},2500);
    } else {
      alert('등록 실패: '+(data.message||''));
    }
  })
  .catch(()=>{btn.disabled=false;btn.textContent='게시글 등록하기';alert('오류가 발생했습니다.');});
}

document.getElementById('pwInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')doLogin();
});
</script>
</body>
</html>
