<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 현황 확인 | 고유재 한옥스튜디오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1814;--paper:#f7f2ea;--paper2:#f0e9dc;
  --gold:#a07840;--gold2:#c49a58;--muted:#7a6e62;
  --line:rgba(28,24,20,0.1);--green:#3a6b3a;--red:#8b2e2e;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);font-weight:300;line-height:1.7;min-height:100vh;}

/* NAV */
.nav{
  background:rgba(247,242,234,0.97);border-bottom:0.5px solid var(--line);
  padding:18px 40px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.nav-logo{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;letter-spacing:0.12em;color:var(--ink);text-decoration:none;}
.nav-logo em{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--gold);letter-spacing:0.25em;margin-top:1px;}
.nav-back{font-size:12px;color:var(--muted);letter-spacing:0.12em;text-decoration:none;}
.nav-back:hover{color:var(--ink);}

/* HERO */
.hero{
  background:var(--ink);
  padding:64px 40px 56px;
  text-align:center;
}
.hero-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:12px;color:var(--gold2);letter-spacing:0.3em;
  margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px;
}
.hero-label::before,.hero-label::after{content:'';width:24px;height:0.5px;background:var(--gold);}
.hero-title{
  font-family:'Noto Serif KR',serif;
  font-size:36px;font-weight:300;color:var(--paper);
  line-height:1.3;margin-bottom:12px;letter-spacing:0.02em;
}
.hero-desc{font-size:13px;color:rgba(247,242,234,0.45);letter-spacing:0.05em;line-height:1.9;}

/* SEARCH BOX */
.search-wrap{max-width:480px;margin:0 auto;padding:56px 40px;}

.search-card{
  background:var(--paper);
  border:0.5px solid var(--line);
  padding:40px;
  text-align:center;
}
.search-icon{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;color:var(--gold);opacity:0.4;
  margin-bottom:20px;line-height:1;
}
.search-title{
  font-family:'Noto Serif KR',serif;
  font-size:20px;font-weight:300;margin-bottom:8px;
}
.search-desc{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.8;letter-spacing:0.03em;}

.pin-wrap{
  display:flex;justify-content:center;gap:10px;margin-bottom:28px;
}
.pin-input{
  width:56px;height:64px;
  border:0.5px solid var(--line);
  background:var(--paper2);
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:300;
  color:var(--ink);outline:none;
  transition:border-color .3s,background .3s;
  border-radius:0;
  -webkit-appearance:none;
}
.pin-input:focus{border-color:var(--gold);background:var(--paper);}
.pin-input.filled{border-color:var(--gold);background:var(--paper);}

.btn-search{
  width:100%;background:var(--ink);color:var(--paper);border:none;
  padding:16px;font-family:'Noto Sans KR',sans-serif;
  font-size:12px;letter-spacing:0.22em;cursor:pointer;transition:all .35s;
}
.btn-search:hover{background:var(--gold);}
.btn-search:disabled{background:var(--muted);cursor:not-allowed;}

.search-hint{font-size:11px;color:var(--muted);margin-top:16px;letter-spacing:0.05em;line-height:1.8;}

/* LOADING */
.loading{display:none;text-align:center;padding:20px 0;}
.loading.show{display:block;}
.spinner{display:inline-block;width:28px;height:28px;border:1px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
.results-wrap{max-width:600px;margin:0 auto;padding:0 40px 80px;}
.results-wrap.show{display:block;}

.result-header{
  text-align:center;margin-bottom:32px;
  padding-top:48px;
}
.result-header-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:12px;color:var(--gold);letter-spacing:0.25em;margin-bottom:12px;
}
.result-header-title{
  font-family:'Noto Serif KR',serif;
  font-size:24px;font-weight:300;
}

.result-card{
  border:0.5px solid var(--line);
  margin-bottom:16px;
  overflow:hidden;
}
.result-card-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;
  border-bottom:0.5px solid var(--line);
  background:var(--paper2);
}
.result-baby{
  font-family:'Noto Serif KR',serif;
  font-size:18px;font-weight:300;letter-spacing:0.05em;
}
.result-baby em{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:13px;
  color:var(--muted);letter-spacing:0.15em;
  margin-left:8px;font-weight:300;
}
.status-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;letter-spacing:0.1em;
  padding:6px 14px;border:0.5px solid;
}
.status-badge.waiting{
  color:#8b6914;border-color:rgba(139,105,20,0.3);
  background:rgba(139,105,20,0.06);
}
.status-badge.done{
  color:var(--green);border-color:rgba(58,107,58,0.3);
  background:rgba(58,107,58,0.06);
}
.status-badge.cancel{
  color:var(--red);border-color:rgba(139,46,46,0.3);
  background:rgba(139,46,46,0.06);
}

.result-card-body{padding:24px;}
.result-row{
  display:grid;grid-template-columns:100px 1fr;
  gap:8px;padding:10px 0;
  border-bottom:0.5px solid var(--line);
  font-size:13px;
}
.result-row:last-child{border-bottom:none;}
.result-key{color:var(--muted);letter-spacing:0.08em;}
.result-val{color:var(--ink);letter-spacing:0.03em;}

.result-notice{
  margin-top:12px;
  background:rgba(160,120,64,0.06);
  border:0.5px solid rgba(160,120,64,0.2);
  padding:16px 20px;
  font-size:12px;color:var(--muted);line-height:1.9;letter-spacing:0.04em;
}

/* NO RESULT */
.no-result{
  text-align:center;padding:48px 0;
}
.no-result-icon{font-size:40px;margin-bottom:16px;opacity:0.3;}
.no-result-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:300;margin-bottom:8px;}
.no-result-desc{font-size:13px;color:var(--muted);line-height:1.9;letter-spacing:0.03em;}

/* 재검색 버튼 */
.btn-reset{
  display:inline-block;margin-top:24px;
  background:transparent;border:0.5px solid var(--gold);
  color:var(--gold);padding:12px 32px;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;
  letter-spacing:0.2em;cursor:pointer;transition:all .3s;
}
.btn-reset:hover{background:var(--gold);color:var(--paper);}

/* 하단 링크 */
.bottom-link{
  text-align:center;padding:32px 0 0;
  font-size:12px;color:var(--muted);letter-spacing:0.08em;
}
.bottom-link a{color:var(--gold);text-decoration:none;}
.bottom-link a:hover{text-decoration:underline;}

@media(max-width:600px){
  .nav{padding:16px 20px;}
  .hero{padding:48px 20px 40px;}
  .hero-title{font-size:28px;}
  .search-wrap{padding:40px 20px;}
  .results-wrap{padding:0 20px 60px;}
  .pin-input{width:48px;height:56px;font-size:24px;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">
    고유재 한옥스튜디오
    <em>Koyuje Hanok Studio</em>
  </a>
  <a href="/" class="nav-back">← 홈으로</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">예약 현황 확인</div>
  <h1 class="hero-title">예약이 잘 접수되었는지<br>확인해보세요</h1>
  <p class="hero-desc">
    예약확정 신청 후 48시간 이내에 상태가 업데이트됩니다.<br>
    문의사항은 카카오톡 @고유재 또는 010-7635-9689
  </p>
</div>

<!-- SEARCH -->
<div class="search-wrap" id="searchSection">
  <div class="search-card">
    <div class="search-icon">✦</div>
    <div class="search-title">전화번호로 확인하기</div>
    <p class="search-desc">
      예약 시 입력하신 연락처의<br>
      <strong style="color:var(--ink);font-weight:400;">끝 4자리</strong>를 입력해 주세요.
    </p>

    <div class="pin-wrap">
      <input type="number" class="pin-input" id="p1" maxlength="1" min="0" max="9">
      <input type="number" class="pin-input" id="p2" maxlength="1" min="0" max="9">
      <input type="number" class="pin-input" id="p3" maxlength="1" min="0" max="9">
      <input type="number" class="pin-input" id="p4" maxlength="1" min="0" max="9">
    </div>

    <button class="btn-search" id="searchBtn" onclick="doSearch()">예약 현황 조회</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <p class="search-hint">
      · 개인정보 보호를 위해 전화번호 끝 4자리로만 조회됩니다.<br>
      · 조회가 안 되실 경우 카카오톡으로 문의해 주세요.
    </p>
  </div>
</div>

<!-- RESULTS -->
<div class="results-wrap" id="resultsSection" style="display:none;">
  <div id="resultsContent"></div>
  <div style="text-align:center;padding-top:16px;">
    <button class="btn-reset" onclick="resetSearch()">다시 조회하기</button>
  </div>
  <div class="bottom-link">
    예약 문의 · <a href="https://pf.kakao.com/_xiRxjhxj">카카오톡 채널</a> · <a href="tel:010-7635-9689">010-7635-9689</a>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxw6SJr24RXTlQFRnT71kSNHnCVm-AoIQzBNd-08xFFV-wdIzqkcQqso-06DahZFFmf/exec';

// PIN 입력 자동 이동
const pins = ['p1','p2','p3','p4'];
pins.forEach((id, i) => {
  const el = document.getElementById(id);

  el.addEventListener('input', function() {
    // 한 자리만 허용
    if (this.value.length > 1) this.value = this.value.slice(-1);
    if (this.value) {
      this.classList.add('filled');
      if (i < 3) document.getElementById(pins[i+1]).focus();
      else checkAllFilled();
    } else {
      this.classList.remove('filled');
    }
  });

  el.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) {
      document.getElementById(pins[i-1]).focus();
    }
    if (e.key === 'Enter') doSearch();
  });

  // 모바일 숫자패드
  el.addEventListener('focus', function() { this.select(); });
});

function checkAllFilled() {
  const all = pins.every(id => document.getElementById(id).value !== '');
  if (all) document.getElementById('searchBtn').style.background = 'var(--gold)';
}

function getPin() {
  return pins.map(id => document.getElementById(id).value).join('');
}

function doSearch() {
  const pin = getPin();
  if (pin.length !== 4) {
    alert('전화번호 끝 4자리를 모두 입력해 주세요.');
    document.getElementById('p1').focus();
    return;
  }

  document.getElementById('searchBtn').disabled = true;
  document.getElementById('loading').classList.add('show');

  fetch(SCRIPT_URL + '?phone4=' + pin)
    .then(res => res.json())
    .then(data => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('searchBtn').disabled = false;
      showResults(data, pin);
    })
    .catch(() => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('searchBtn').disabled = false;
      alert('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    });
}

function getStatusBadge(status) {
  if (!status || status.includes('확인중')) {
    return '<span class="status-badge waiting">⏳ 확인중</span>';
  } else if (status.includes('완료') || status.includes('확정') || status.includes('✅')) {
    return '<span class="status-badge done">✅ 예약완료</span>';
  } else if (status.includes('취소') || status.includes('❌')) {
    return '<span class="status-badge cancel">❌ 취소</span>';
  } else {
    return '<span class="status-badge waiting">' + status + '</span>';
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
}

function formatTime(timeStr) {
  if (!timeStr) return '-';
  const parts = String(timeStr).split(':');
  if (parts.length >= 2) {
    const h = parseInt(parts[0]);
    const m = parts[1];
    return (h < 12 ? '오전 ' : '오후 ') + (h <= 12 ? h : h-12) + '시 ' + m + '분';
  }
  return timeStr;
}

function showResults(data, pin) {
  document.getElementById('searchSection').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'block';

  const content = document.getElementById('resultsContent');

  if (!data.data || data.data.length === 0) {
    content.innerHTML = `
      <div class="no-result">
        <div class="no-result-icon">🔍</div>
        <div class="no-result-title">조회된 예약이 없습니다</div>
        <p class="no-result-desc">
          입력하신 번호 <strong style="color:var(--ink);font-weight:400;">****-${pin}</strong> 로<br>
          등록된 예약 정보를 찾을 수 없어요.<br><br>
          예약확정 폼을 작성하셨다면<br>
          48시간 후 다시 확인해 주세요.
        </p>
      </div>
    `;
    return;
  }

  let html = `
    <div class="result-header">
      <div class="result-header-label">조회 결과</div>
      <div class="result-header-title">총 ${data.data.length}건의 예약이 확인됩니다</div>
    </div>
  `;

  data.data.forEach((item, idx) => {
    const isWaiting = !item.status || item.status.includes('확인중');
    html += `
      <div class="result-card">
        <div class="result-card-top">
          <div class="result-baby">
            ${item.babyName || '-'}
            <em>아기</em>
          </div>
          ${getStatusBadge(item.status)}
        </div>
        <div class="result-card-body">
          <div class="result-row">
            <div class="result-key">촬영 날짜</div>
            <div class="result-val">${formatDate(item.shootDate)}</div>
          </div>
          <div class="result-row">
            <div class="result-key">촬영 시간</div>
            <div class="result-val">${formatTime(item.shootTime)}</div>
          </div>
          <div class="result-row">
            <div class="result-key">선택 상품</div>
            <div class="result-val">${item.product || '-'}</div>
          </div>
          <div class="result-row">
            <div class="result-key">예약 상태</div>
            <div class="result-val">${item.status || '⏳ 확인중'}</div>
          </div>
          ${isWaiting ? `
          <div class="result-notice">
            📋 예약 신청이 접수되었습니다.<br>
            입금 확인 후 <strong style="color:var(--ink);font-weight:400;">48시간 이내</strong>에 상태가 업데이트됩니다.<br>
            문의: 카카오톡 @고유재 · 010-7635-9689
          </div>` : ''}
        </div>
      </div>
    `;
  });

  content.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetSearch() {
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('searchSection').style.display = 'block';
  pins.forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.classList.remove('filled');
  });
  document.getElementById('searchBtn').style.background = '';
  document.getElementById('p1').focus();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// 첫 번째 PIN에 자동 포커스
window.onload = () => document.getElementById('p1').focus();
</script>
</body>
</html>
