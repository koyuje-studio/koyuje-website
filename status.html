<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 현황 확인 | 고유재 한옥스튜디오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#1c1814;--paper:#f7f2ea;--paper2:#f0e9dc;--gold:#a07840;--gold2:#c49a58;--muted:#7a6e62;--line:rgba(28,24,20,0.1);--green:#3a6b3a;--red:#8b2e2e;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);font-weight:300;line-height:1.7;min-height:100vh;}
.nav{background:rgba(247,242,234,0.97);border-bottom:0.5px solid var(--line);padding:18px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;letter-spacing:0.12em;color:var(--ink);text-decoration:none;}
.nav-logo em{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--gold);letter-spacing:0.25em;margin-top:1px;}
.nav-back{font-size:12px;color:var(--muted);letter-spacing:0.12em;text-decoration:none;}
.nav-back:hover{color:var(--ink);}
.hero{background:var(--ink);padding:64px 40px 56px;text-align:center;}
.hero-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--gold2);letter-spacing:0.3em;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px;}
.hero-label::before,.hero-label::after{content:'';width:24px;height:0.5px;background:var(--gold);}
.hero-title{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:300;color:var(--paper);line-height:1.3;margin-bottom:12px;}
.hero-desc{font-size:13px;color:rgba(247,242,234,0.45);letter-spacing:0.05em;line-height:1.9;}
.search-wrap{max-width:480px;margin:0 auto;padding:56px 40px;}
.search-card{background:var(--paper);border:0.5px solid var(--line);padding:40px;text-align:center;}
.search-icon{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--gold);opacity:0.4;margin-bottom:20px;line-height:1;}
.search-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:300;margin-bottom:8px;}
.search-desc{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.8;}
.phone-input-wrap{margin-bottom:28px;}
.phone-label{font-size:11px;color:var(--muted);letter-spacing:0.15em;margin-bottom:14px;}
.phone-row{display:flex;align-items:center;justify-content:center;gap:6px;}
.phone-fixed{display:flex;align-items:center;justify-content:center;background:var(--paper2);border:0.5px solid var(--line);height:56px;padding:0 14px;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--muted);letter-spacing:0.05em;flex-shrink:0;}
.phone-dash{font-size:18px;color:var(--muted);font-family:'Cormorant Garamond',serif;flex-shrink:0;}
.pin-group{display:flex;gap:3px;}
.pin-input{width:40px;height:56px;border:0.5px solid var(--line);background:var(--paper2);text-align:center;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--ink);outline:none;transition:border-color .3s,background .3s;-webkit-appearance:none;-moz-appearance:textfield;}
.pin-input::-webkit-outer-spin-button,.pin-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.pin-input:focus{border-color:var(--gold);background:var(--paper);}
.pin-input.filled{border-color:var(--gold);background:var(--paper);}
.phone-hint{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:0.05em;}
.btn-search{width:100%;background:var(--ink);color:var(--paper);border:none;padding:16px;font-family:'Noto Sans KR',sans-serif;font-size:12px;letter-spacing:0.22em;cursor:pointer;transition:all .35s;}
.btn-search:hover{background:var(--gold);}
.btn-search:disabled{background:var(--muted);cursor:not-allowed;}
.loading{display:none;text-align:center;padding:20px 0;}
.loading.show{display:block;}
.spinner{display:inline-block;width:28px;height:28px;border:1px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.search-hint{font-size:11px;color:var(--muted);margin-top:16px;letter-spacing:0.04em;line-height:1.9;}
.results-wrap{max-width:600px;margin:0 auto;padding:0 40px 80px;display:none;}
.result-header{text-align:center;margin-bottom:32px;padding-top:48px;}
.result-header-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--gold);letter-spacing:0.25em;margin-bottom:12px;}
.result-header-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:300;}
.result-card{border:0.5px solid var(--line);margin-bottom:16px;overflow:hidden;}
.result-card-top{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:0.5px solid var(--line);background:var(--paper2);}
.result-baby{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:300;letter-spacing:0.05em;}
.result-baby em{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--muted);letter-spacing:0.15em;margin-left:8px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:0.1em;padding:6px 14px;border:0.5px solid;}
.status-badge.waiting{color:#8b6914;border-color:rgba(139,105,20,0.3);background:rgba(139,105,20,0.06);}
.status-badge.done{color:var(--green);border-color:rgba(58,107,58,0.3);background:rgba(58,107,58,0.06);}
.status-badge.cancel{color:var(--red);border-color:rgba(139,46,46,0.3);background:rgba(139,46,46,0.06);}
.result-card-body{padding:24px;}
.result-row{display:grid;grid-template-columns:100px 1fr;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--line);font-size:13px;}
.result-row:last-child{border-bottom:none;}
.result-key{color:var(--muted);letter-spacing:0.08em;}
.result-val{color:var(--ink);letter-spacing:0.03em;}
.result-notice{margin-top:12px;background:rgba(160,120,64,0.06);border:0.5px solid rgba(160,120,64,0.2);padding:16px 20px;font-size:12px;color:var(--muted);line-height:1.9;}
.no-result{text-align:center;padding:48px 0;}
.no-result-icon{font-size:40px;margin-bottom:16px;opacity:0.3;}
.no-result-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:300;margin-bottom:8px;}
.no-result-desc{font-size:13px;color:var(--muted);line-height:1.9;}
.btn-reset{display:inline-block;margin-top:24px;background:transparent;border:0.5px solid var(--gold);color:var(--gold);padding:12px 32px;font-family:'Noto Sans KR',sans-serif;font-size:12px;letter-spacing:0.2em;cursor:pointer;transition:all .3s;}
.btn-reset:hover{background:var(--gold);color:var(--paper);}
.bottom-link{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted);}
.bottom-link a{color:var(--gold);text-decoration:none;}
@media(max-width:600px){.nav{padding:16px 20px;}.hero{padding:48px 20px 40px;}.hero-title{font-size:26px;}.search-wrap{padding:32px 16px;}.search-card{padding:28px 20px;}.results-wrap{padding:0 16px 60px;}.pin-input{width:34px;height:50px;font-size:18px;}.phone-fixed{height:50px;font-size:17px;padding:0 10px;}}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">고유재 한옥스튜디오<em>Koyuje Hanok Studio</em></a>
  <a href="/" class="nav-back">← 홈으로</a>
</nav>

<div class="hero">
  <div class="hero-label">예약 현황 확인</div>
  <h1 class="hero-title">예약이 잘 접수되었는지<br>확인해보세요</h1>
  <p class="hero-desc">예약확정 신청 후 48시간 이내에 상태가 업데이트됩니다.<br>문의: 카카오톡 @고유재 · 010-7635-9689</p>
</div>

<div class="search-wrap" id="searchSection">
  <div class="search-card">
    <div class="search-icon">✦</div>
    <div class="search-title">전화번호로 확인하기</div>
    <p class="search-desc">예약 시 입력하신 휴대폰 번호<br><strong style="color:var(--ink);font-weight:400;">010을 제외한 8자리</strong>를 입력해 주세요.</p>

    <div class="phone-input-wrap">
      <div class="phone-label">휴대폰 번호 입력</div>
      <div class="phone-row">
        <div class="phone-fixed">010</div>
        <div class="phone-dash">—</div>
        <div class="pin-group">
          <input type="number" class="pin-input" id="d1" min="0" max="9">
          <input type="number" class="pin-input" id="d2" min="0" max="9">
          <input type="number" class="pin-input" id="d3" min="0" max="9">
          <input type="number" class="pin-input" id="d4" min="0" max="9">
        </div>
        <div class="phone-dash">—</div>
        <div class="pin-group">
          <input type="number" class="pin-input" id="d5" min="0" max="9">
          <input type="number" class="pin-input" id="d6" min="0" max="9">
          <input type="number" class="pin-input" id="d7" min="0" max="9">
          <input type="number" class="pin-input" id="d8" min="0" max="9">
        </div>
      </div>
      <div class="phone-hint">예) 010 — <strong>1234</strong> — <strong>5678</strong></div>
    </div>

    <button class="btn-search" id="searchBtn" onclick="doSearch()">예약 현황 조회</button>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <p class="search-hint">· 조회가 안 되실 경우 카카오톡으로 문의해 주세요</p>
  </div>
</div>

<div class="results-wrap" id="resultsSection">
  <div id="resultsContent"></div>
  <div style="text-align:center;padding-top:16px;">
    <button class="btn-reset" onclick="resetSearch()">다시 조회하기</button>
  </div>
  <div class="bottom-link">
    예약 문의 · <a href="https://pf.kakao.com/_xiRxjhxj">카카오톡 채널</a> · <a href="tel:010-7635-9689">010-7635-9689</a>
  </div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxw6SJr24RXTlQFRnT71kSNHnCVm-AoIQzBNd-08xFFV-wdIzqkcQqso-06DahZFFmf/exec';
const ids=['d1','d2','d3','d4','d5','d6','d7','d8'];
ids.forEach((id,i)=>{
  const el=document.getElementById(id);
  el.addEventListener('input',function(){
    if(this.value.length>1)this.value=this.value.slice(-1);
    if(this.value){this.classList.add('filled');if(i<7)document.getElementById(ids[i+1]).focus();}
    else this.classList.remove('filled');
  });
  el.addEventListener('keydown',function(e){
    if(e.key==='Backspace'&&!this.value&&i>0)document.getElementById(ids[i-1]).focus();
    if(e.key==='Enter')doSearch();
  });
  el.addEventListener('focus',function(){this.select();});
});
function getPhone8(){return ids.map(id=>document.getElementById(id).value).join('');}
function doSearch(){
  const p=getPhone8();
  if(p.length!==8||p.includes('')){alert('010 제외 8자리를 모두 입력해 주세요.');document.getElementById('d1').focus();return;}
  document.getElementById('searchBtn').disabled=true;
  document.getElementById('loading').classList.add('show');
  fetch(SCRIPT_URL+'?phone8='+p)
    .then(r=>r.json())
    .then(data=>{document.getElementById('loading').classList.remove('show');document.getElementById('searchBtn').disabled=false;showResults(data,p);})
    .catch(()=>{document.getElementById('loading').classList.remove('show');document.getElementById('searchBtn').disabled=false;alert('조회 중 오류가 발생했습니다.');});
}
function badge(s){
  if(!s||s.includes('확인중'))return'<span class="status-badge waiting">⏳ 확인중</span>';
  if(s.includes('완료')||s.includes('✅'))return'<span class="status-badge done">✅ 예약완료</span>';
  if(s.includes('취소')||s.includes('❌'))return'<span class="status-badge cancel">❌ 취소</span>';
  return'<span class="status-badge waiting">'+s+'</span>';
}
function fDate(d){if(!d)return'-';const dt=new Date(d);if(isNaN(dt))return d;return dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일';}
function fTime(t){if(!t)return'-';const p=String(t).split(':');if(p.length>=2){const h=parseInt(p[0]),m=p[1];return(h<12?'오전 ':'오후 ')+(h===0?12:h>12?h-12:h)+'시 '+m+'분';}return t;}
function showResults(data,p){
  document.getElementById('searchSection').style.display='none';
  document.getElementById('resultsSection').style.display='block';
  const c=document.getElementById('resultsContent');
  const pd='010-'+p.slice(0,4)+'-'+p.slice(4);
  if(!data.data||data.data.length===0){
    c.innerHTML=`<div class="no-result"><div class="no-result-icon">🔍</div><div class="no-result-title">조회된 예약이 없습니다</div><p class="no-result-desc"><strong style="color:var(--ink);font-weight:400;">${pd}</strong> 로 등록된 예약 정보를 찾을 수 없어요.<br><br>예약확정 폼을 작성하셨다면<br>48시간 후 다시 확인해 주세요.</p></div>`;
    return;
  }
  let html=`<div class="result-header"><div class="result-header-label">${pd} 조회 결과</div><div class="result-header-title">총 ${data.data.length}건의 예약이 확인됩니다</div></div>`;
  data.data.forEach(item=>{
    const w=!item.status||item.status.includes('확인중');
    html+=`<div class="result-card"><div class="result-card-top"><div class="result-baby">${item.babyName||'-'}<em>아기</em></div>${badge(item.status)}</div><div class="result-card-body"><div class="result-row"><div class="result-key">촬영 날짜</div><div class="result-val">${fDate(item.shootDate)}</div></div><div class="result-row"><div class="result-key">촬영 시간</div><div class="result-val">${fTime(item.shootTime)}</div></div><div class="result-row"><div class="result-key">선택 상품</div><div class="result-val">${item.product||'-'}</div></div><div class="result-row"><div class="result-key">예약 상태</div><div class="result-val">${item.status||'⏳ 확인중'}</div></div>${w?'<div class="result-notice">📋 예약 신청이 접수되었습니다.<br>입금 확인 후 <strong style="color:var(--ink);font-weight:400;">48시간 이내</strong>에 상태가 업데이트됩니다.<br>문의: 카카오톡 @고유재 · 010-7635-9689</div>':''}</div></div>`;
  });
  c.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetSearch(){
  document.getElementById('resultsSection').style.display='none';
  document.getElementById('searchSection').style.display='block';
  ids.forEach(id=>{const el=document.getElementById(id);el.value='';el.classList.remove('filled');});
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>document.getElementById('d1').focus(),100);
}
window.onload=()=>document.getElementById('d1').focus();
</script>
</body>
</html>
